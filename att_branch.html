<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Dashboard - Ciência de Dados</title>
    <style>
        /* CSS BASE - ESTE É O BLOCO QUE ELES VÃO ALTERAR NA BRANCH */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #006434;
            /* Cor para alterar no modo noturno */
            color: #333;
            /* Cor para alterar no modo noturno */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .dashboard-container {
            background-color: white;
            /* Cor para alterar no modo noturno */
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #006434; 
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .card {
            background: #e9ecef;
            padding: 15px;
            border-radius: 8px;
        }

        .card-value {
            font-size: 24px;
            font-weight: bold;
            display: block;
        }

        .card-label {
            font-size: 14px;
            color: #666;
        }

        .img-escudo img {
            width: 50px;
            height: 50px;
        }
    </style>
</head>

<body>

    <div class="dashboard-container">
        <h1>Dashboard atletas profissionais</h1>
        <p style="margin-top: -15px; margin-bottom: 20px;">Histórico de desempenho</p>

        <div class="metrics-grid">
            <div class="card">
                <span class="card-value">82.2%</span>
                <span class="card-label">Aproveitamento em partidas</span>
            </div>
            <div class="card">
                <span class="card-value">1.2 pts</span>
                <span class="card-label">Margem de erro</span>
            </div>
            <div class="card">
                <span class="card-value">14</span>
                <span class="card-label">Vitorias na temporada</span>
            </div>
            <div class="card">
                <span class="card-value">35%</span>
                <span class="card-label">De meta concluída</span>
            </div>
        </div>

        <p style="margin-top: 25px; font-size: 12px; color: #999;">
            Status do Servidor: <span style="color: red; padding-left: 2px;">● Offline</span>
        </p>
        <div class="img-escudo">
            <img src="https://www.palmeiras.com.br/wp-content/uploads/2021/10/1916-3.png" alt="">
        </div>
    </div>

</body>

</html
