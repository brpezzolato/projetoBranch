<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Dashboard - Ciência de Dados</title>
    <style>
        /* CSS BASE - ESTE É O BLOCO QUE ELES VÃO ALTERAR NA BRANCH */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #006434;
            /* Cor para alterar no modo noturno */
            color: #333;
            /* Cor para alterar no modo noturno */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .dashboard-container {
            background-color: white;
            /* Cor para alterar no modo noturno */
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #006434;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .card {
            background: #e9ecef;
            padding: 15px;
            border-radius: 8px;
        }

        .card-value {
            font-size: 24px;
            font-weight: bold;
            display: block;
        }

        .card-value2 {
            font-size: 24px;
            font-weight: bold;
            display: block;
        }

        .card-value2 span {
            background-color: #ff963f;
            width: 40px;
            padding: 1px;
            padding-left: 15px;
            padding-right: 15px;
            border-radius: 10px;
        }

        .card-label {
            font-size: 14px;
            color: #666;
        }

        .img-escudo img {
            width: 50px;
            height: 50px;
        }
    </style>
</head>

<body>

    <div class="dashboard-container">
        <h1>Dashboard Gustavo Gómez</h1>
        <p style="margin-top: -15px;">Histórico de desempenho - Zagueiro titular</p>

        <div class="flex" style="display: flex; justify-content: center; margin-bottom: 5px;">
            <img src="https://images.fotmob.com/image_resources/playerimages/274392.png"
                style="width: 100px; height: 100px;">
        </div>
        <div class="metrics-grid">
            <div class="card">
                <span class="card-value">82.2%</span>
                <span class="card-label">Aproveitamento em partidas</span>
            </div>
            <div class="card">
                <span class="card-value">9 partidas</span>
                <span class="card-label">Partidas jogadas</span>
            </div>
            <div class="card">
                <span class="card-value">1 🟨</span>
                <span class="card-label">Cartões amarelos</span>
            </div>
            <div class="card">
                <span class="card-value2"><span>6.99</span></span>
                <span class="card-label">Avaliação</span>
            </div>
        </div>

        <p style="margin-top: 25px; font-size: 12px; color: #999;">
            Status do Servidor: <span style="color: red; padding-left: 2px;">● Offline</span>
        </p>
        <div class="img-escudo">
            <img src="https://s2-ge.glbimg.com/zNkvJJ_2fBmwgMATjvFYit5So60=/0x0:334x335/984x0/smart/filters:strip_icc()/i.s3.glbimg.com/v1/AUTH_bc8228b6673f488aa253bbcb03c80ec5/internal_photos/bs/2023/k/s/a3aJTBRQS2b4Gxrr7mcQ/1942.png"
                alt="">
        </div>
    </div>

</body>

</html
